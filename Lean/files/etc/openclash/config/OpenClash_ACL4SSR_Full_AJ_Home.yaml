# Generated for OpenClash from config.yaml + ACL4SSR_Online_Full_AJ_Home.ini
# 说明：保留原 config.yaml 的基础设置、proxy-providers、proxies；按 ACL.ini 重建 proxy-groups、rule-providers、rules。

# 机场订阅

proxy-providers:
  AmyTelecom:
    url: https://161.129.35.81/?L1N1YnNjcmlwdGlvbi9DbGFzaD90PTIwMjImc2lkPTg5MTYyJnRva2VuPUdQOE1BRWhFd0FvJm1tPTk5MjQ4Jmt0bW09ZzlHVXBEWGV3aTJOVFg2WnA5N1FYZz09JjhkMGExNzkxJm1tPTk5MjQ4Jmt0bW09ZzlHVXBEWGV3aTF6bzJPR09XVHcwUSUzZCUzZCYwZmEzMjMyNzM2ZWI0MjBhOWVhZjk3MzM=
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: DIRECT
    filter: "^(?!.*(流量|时间|官网|剩余|过期|到期|套餐|重置|Expire|Traffic|Reset|订阅)).*"

################################################################################################################

# 节点信息

proxies:
- name: ALI-HK
  type: trojan
  server: ali-hk.b-gfw.cfd
  port: 12012
  password: '12012'
  udp: true
  sni: ali-hk.b-gfw.cfd
  skip-cert-verify: true
  ip-version: ipv4-prefer
  tfo: false

- name: ALI-JP
  type: trojan
  server: ali-jp.b-gfw.cfd
  port: 12012
  password: '12012'
  udp: true
  sni: ali-jp.b-gfw.cfd
  alpn:
  - h2
  skip-cert-verify: true
  ip-version: ipv4-prefer
  tfo: false

# 全局配置

mixed-port: 7890
allow-lan: true
bind-address: '*'
ipv6: false
unified-delay: true
tcp-concurrent: true
log-level: warning
keep-alive-idle: 600
keep-alive-interval: 15
profile:
  store-selected: true
  store-fake-ip: true

# 为防止使用插件朋友遇到面板问题，我注释掉了此模块。
#external-controller: 0.0.0.0:9090
#secret: ""
#external-ui: ui
#external-ui-name: zashboard
#external-ui-url: "https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip"

# 嗅探（fakeip下其实可以不用嗅探）

sniffer:
  enable: true
  sniff:
    HTTP:
      ports:
      - 80
      - 8080-8880
      override-destination: true
    TLS:
      ports:
      - 443
      - 8443
    QUIC:
      ports:
      - 443
      - 8443
  skip-domain:
  - Mijia Cloud
  - +.push.apple.com

# 入站

tun:
  enable: true
  stack: mixed
  dns-hijack:
  - any:53
  - tcp://any:53
  auto-route: false
  auto-redirect: false
  auto-detect-interface: false

# DNS模块
dns:
  enable: true
  cache-algorithm: arc
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  fake-ip-filter: []
  default-nameserver:
    - 127.0.0.1
    #- https://223.5.5.5/dns-query
  proxy-server-nameserver:
    - 127.0.0.1
#    - https://dns.alidns.com/dns-query
#    - https://doh.pub/dns-query
  nameserver:
    - 127.0.0.1
#    - https://dns.alidns.com/dns-query
#    - https://doh.pub/dns-query

