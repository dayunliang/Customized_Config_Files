# =============================================================================
# 新架构：MosDNS v5 闭环配置文件（config_custom.yaml）
# 修正时间：2026-06-27 CST
# 修正重点：
# 1. 修复 sequence 插件 args 结构：args 下直接写规则列表，不再套 exec:
# 2. 自定义插件调用统一使用 $tag
# 3. 保持原有 Hosts -> nocache -> ads -> cache -> gfw -> local 的闭环逻辑
# =============================================================================

log:
  level: info
  file: "/var/log/mosdns.log"

api:
  http: "0.0.0.0:8338"

# 引入一键脚本拉取的外挂规则包
include:
  - "/etc/mosdns/dat_exec.yaml"

plugins:
  # 1. 本地大缓存插件
  - tag: local_cache
    type: cache
    args:
      size: 10240
      lazy_cache_ttl: 86400

  # 2. 穿透缓存匹配器
  - tag: query_is_nocache
    type: domain_set
    args:
      files:
        - "/etc/mosdns/rule/nocache.txt"

  # 3. 国内直连上游 DNS
  - tag: forward_local
    type: forward
    args:
      upstreams:
        - addr: "116.228.111.18"   # 上海电信主 DNS
        - addr: "180.168.255.118"  # 上海电信备 DNS
        - addr: "223.5.5.5"        # 阿里公共 DNS
        - addr: "119.29.29.29"     # 腾讯公共 DNS

  # 4. 海外自建 VPS 加密上游
  - tag: forward_remote_vps
    type: forward
    args:
      upstreams:
        - addr: "https://ali-hk.b-gfw.cfd:442/dns-query"
        - addr: "https://ali-sg.b-gfw.cfd:442/dns-query"

  # 5. 本地 Hosts 文件解析
  - tag: local_hosts
    type: hosts
    args:
      files:
        - "/etc/mosdns/rules-dat/hosts.txt"

  # =============================================================================
  # 主处理流程控制序列（main_sequence）
  # =============================================================================
  - tag: main_sequence
    type: sequence
    args:
      # 第 1 步：优先查本地 Hosts
      - exec: $local_hosts

      # 第 2 步：如果 Hosts 没命中，并且命中 nocache 列表，直接走国内直连 DNS
      - matches:
          - "!has_resp"
          - qname $query_is_nocache
        exec: $forward_local

      # 第 3 步：如果仍无应答，并且命中广告列表，直接返回 NXDOMAIN
      - matches:
          - "!has_resp"
          - qname $geosite_category-ads-all
        exec: reject 3

      # 第 4 步：如果仍无应答，查询本地缓存
      - matches:
          - "!has_resp"
        exec: $local_cache

      # 第 5 步：如果缓存没命中，并且属于 GFW 域名，走海外 VPS DoH
      - matches:
          - "!has_resp"
          - qname $geosite_gfw
        exec: $forward_remote_vps

      # 第 6 步：其他剩余域名兜底走国内直连
      - matches:
          - "!has_resp"
        exec: $forward_local

      # 第 7 步：有新应答后再次调用 cache，写回缓存
      - exec: $local_cache

  # =============================================================================
  # DNS 服务监听
  # =============================================================================
  - type: udp_server
    args:
      entry: main_sequence
      listen: ":53"

  - type: tcp_server
    args:
      entry: main_sequence
      listen: ":53"
