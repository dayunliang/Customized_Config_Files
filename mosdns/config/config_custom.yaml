# =============================================================================
# 新架构：MosDNS v4 完美闭环配置文件（config_custom.yaml）
# 流向：客户端 ──> 本地 ADH（Host:53） ──> 本地 MosDNS（Bridge:5335） ──> 分流上游
# =============================================================================

log:
  level: info                   # 生产环境建议 info，如需排错可改为 debug
  file: "/var/log/mosdns.log"

api:
  http: "0.0.0.0:8338"          # MosDNS HTTP API 接口

# =============================================================================
# 引入外部数据包（继续复用您原有的 $geosite_gfw 和 $geosite_category-ads-all 变量）
# =============================================================================
include:
  - "/etc/mosdns/dat_exec.yaml"

# =============================================================================
# 插件定义区
# =============================================================================
plugins:

  # ---------------------------------------------------------------------------
  # 1. 本地大缓存插件（由 MosDNS 统一接管全家 DNS 缓存大脑）
  # ---------------------------------------------------------------------------
  - tag: local_cache
    type: cache
    args:
      size: 10240               # 内存缓存大小（条数）
      lazy_cache_ttl: 86400     # 开启 24 小时懒缓存，极致加速二次解析

  # ---------------------------------------------------------------------------
  # 2. 穿透缓存匹配器（强制穿透，不准查缓存）
  # ---------------------------------------------------------------------------
  - tag: query_is_nocache
    type: domain_set
    args:
      files:
        - "/etc/mosdns/rule/nocache.txt" # 对应宿主机路径：/root/mosdns/config/rule/nocache.txt

  # ---------------------------------------------------------------------------
  # 3. 广告硬拒绝插件（保持您原有的 NXDOMAIN 逻辑）
  # ---------------------------------------------------------------------------
  - tag: reject_ads
    type: sequence
    args:
      - exec: "reject 3"        # 返回 3 = NXDOMAIN

  - tag: route_ads
    type: sequence
    args:
      - matches: qname $geosite_category-ads-all
        exec: $reject_ads

# ---------------------------------------------------------------------------
  # 4. 国内直连上游 DNS（改用最简单、低延迟的普通 53 端口 UDP DNS）
  # ---------------------------------------------------------------------------
  - tag: forward_local
    type: forward
    args:
      upstreams:
        - addr: "116.228.111.18"   # 上海电信主 DNS（本地 ISP，延迟最低、CDN 分配最准）
        - addr: "180.168.255.118"  # 上海电信备 DNS
        - addr: "223.5.5.5"        # 阿里公共 DNS（高可靠兜底）
        - addr: "119.29.29.29"      # 腾讯公共 DNS（高可靠兜底）

  # ---------------------------------------------------------------------------
  # 5. 海外自建 VPS 加密上游（已完美写入您真实的公网 442 端口 DoH）
  # ---------------------------------------------------------------------------
  - tag: forward_remote_vps
    type: forward
    args:
      upstreams:
        - addr: "https://ali-hk.b-gfw.cfd:442/dns-query" # 阿里云香港单体 ADH
        - addr: "https://ali-sg.b-gfw.cfd:442/dns-query" # 阿里云新加坡单体 ADH

  # ---------------------------------------------------------------------------
  # 6. 海外 GFW 路由执行序列（解析成功后自动回写本地缓存）
  # ---------------------------------------------------------------------------
  - tag: route_gfw_sequence
    type: sequence
    args:
      - matches: qname $geosite_gfw
        exec: $forward_remote_vps
      - matches: has_resp
        exec: $local_cache

  # ---------------------------------------------------------------------------
  # 7. 本地 Hosts 文件解析（保持您原有的内网设备固定域名习惯）
  # ---------------------------------------------------------------------------
  - tag: local_hosts
    type: hosts
    args:
      files:
        - "/etc/mosdns/rules-dat/hosts.txt"

  # =============================================================================
  # 主处理流程控制序列（main_sequence）
  # =============================================================================
  - tag: main_sequence
    type: sequence
    args:
      # 【第一步】本地 Hosts 匹配
      - exec: $local_hosts
      - matches: has_resp
        exec: return

      # 【第二步】🔥 穿透缓存匹配（遇到直接走国内公共 DNS，不查缓存也不写入缓存）
      - matches: qname $query_is_nocache
        exec: $forward_local
      - matches: has_resp
        exec: return

      # 【第三步】广告域名硬拦截
      - exec: $route_ads
      - matches: has_resp
        exec: return

      # 【第四步】核心缓存大盘盘查（国内/海外通查，命中直接秒回）
      - exec: $local_cache
      - matches: has_resp
        exec: return

      # 【第五步】明确属于 GFW 的海外域名分流流程
      - exec: $route_gfw_sequence
      - matches: has_resp
        exec: return

      # 【第六步】Fallback 兜底流程：其余所有域名（CN域名/未分类域名）走国内解析并写入缓存
      - exec: $forward_local
      - matches: has_resp
        exec: $local_cache

# =============================================================================
# DNS 服务监听（对接 Docker 内部的标准 53 端口）
# =============================================================================
  - type: udp_server
    args:
      entry: main_sequence
      listen: ":53"

  - type: tcp_server
    args:
      entry: main_sequence
      listen: ":53"
